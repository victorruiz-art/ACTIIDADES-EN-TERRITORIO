<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Observatorio de Políticas Sociales — Oferta Territorial</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
:root{
  --bg:#f7f1f8;
  --card:#ffffff;
  --dark:#a316b6;
  --accent:#c218c2;
  --accent2:#8e0f9f;
  --cyan:#d96ad9;
  --green:#39b56a;
  --orange:#d46ad3;
  --red:#b51f8f;
  --text:#4a235a;
  --muted:#8a5a96;
  --border:#ebd7ef;
  --radius:12px;
  --shadow:0 4px 16px rgba(163,22,182,.12);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  overflow:auto;
}

/* HEADER CON IMAGEN */
.hdr-banner{
  position:relative;
  background:linear-gradient(90deg,#a316b6 0%, #c218c2 100%);
  padding:0;
  min-height:140px;
  border-bottom:4px solid var(--accent2);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.hdr-banner-img{
  width:100%;
  max-height:220px;
  object-fit:cover;
  display:block;
}

.floating-badges{
  position:absolute;
  right:24px;
  top:22px;
  display:flex;
  gap:10px;
  align-items:center;
  z-index:10;
}

.badge{
  border-radius:20px;
  padding:6px 14px;
  font-size:12px;
  font-weight:700;
}

.badge-blue{
  background:rgba(255,255,255,.14);
  color:#fff;
  border:1px solid rgba(255,255,255,.28);
}

.badge-green{
  background:rgba(57,181,106,.18);
  color:#d8ffe5;
  border:1px solid rgba(57,181,106,.35);
}

/* KPI STRIP */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  padding:14px 20px;
  background:#f4eaf6;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}

.kpi{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  transition:all .2s;
  box-shadow:var(--shadow);
}

.kpi:hover{
  transform:translateY(-2px);
}

.kpi-icon{
  width:42px;
  height:42px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  flex-shrink:0;
  background:linear-gradient(180deg,#c218c2,#a316b6);
  color:#fff;
}

.ki-b,.ki-c,.ki-g,.ki-o{
  background:linear-gradient(180deg,#c218c2,#a316b6);
}

.kpi-num{
  font-family:'Syne',sans-serif;
  font-size:22px;
  font-weight:800;
  color:#8e0f9f;
  line-height:1.1;
}

.kpi-lbl{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.6px;
  margin-top:4px;
}

/* MAIN LAYOUT */
.layout{
  display:grid;
  grid-template-columns:410px 1fr;
  flex:1;
  min-height:0;
}

/* SIDEBAR */
.sidebar{
  background:#fbf7fc;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  min-height:0;
}

.sb-sec{
  padding:12px 14px 8px;
  border-bottom:1px solid var(--border);
}

.sb-sec h3{
  font-family:'Syne',sans-serif;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  color:#8e0f9f;
  margin-bottom:10px;
}

.sel{
  width:100%;
  border:1.5px solid #d9b8e2;
  border-radius:9px;
  padding:10px 12px;
  font-size:13px;
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  background:#fff;
  outline:none;
  margin-bottom:8px;
  transition:border-color .2s, box-shadow .2s;
}

.sel:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(194,24,194,.12);
}

.btn-row{
  display:flex;
  gap:6px;
}

.btn{
  flex:1;
  padding:8px;
  border:1.5px solid var(--border);
  border-radius:9px;
  background:#fff;
  color:var(--text);
  font-size:12px;
  font-family:'DM Sans',sans-serif;
  font-weight:600;
  cursor:pointer;
  transition:all .15s;
}

.btn:hover{
  border-color:var(--accent);
  color:var(--accent);
}

.btn-filled{
  background:linear-gradient(90deg,#a316b6,#c218c2);
  border-color:#a316b6;
  color:#fff;
}

.btn-filled:hover{
  background:linear-gradient(90deg,#8e0f9f,#b216b2);
}

/* TABLA SIDEBAR */
.sb-tabla{
  flex:1;
  overflow-y:auto;
  padding:8px 10px;
}

.sb-tabla table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

.sb-tabla th{
  background:#f3d9f7;
  color:#7d2d8f;
  font-weight:700;
  padding:6px 8px;
  text-align:left;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.5px;
  border-bottom:2px solid #deb6e7;
}

.sb-tabla td{
  padding:6px 8px;
  border-bottom:1px solid #f0e2f3;
  color:var(--text);
}

.sb-tabla tr:hover td{
  background:#fbf2fc;
}

.sb-tabla td:last-child,
.sb-tabla th:last-child{
  text-align:right;
  font-weight:600;
}

/* STATS BOTTOM */
.sb-stats{
  padding:8px 12px;
  display:flex;
  gap:6px;
  background:#f7f1f8;
  border-top:1px solid var(--border);
  flex-shrink:0;
}

.sstat{
  flex:1;
  text-align:center;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px;
}

.sstat .n{
  font-family:'Syne',sans-serif;
  font-size:18px;
  font-weight:800;
  color:#a316b6;
}

.sstat .l{
  font-size:10px;
  color:#8a5a96;
  text-transform:uppercase;
  letter-spacing:.4px;
}

/* MAPA */
#map{
  width:100%;
  height:100%;
}

.leaflet-popup-content-wrapper{
  border-radius:12px;
  box-shadow:0 8px 24px rgba(163,22,182,.16);
  font-family:'DM Sans',sans-serif;
  border:1px solid #ebd7ef;
}

.pu-title{
  font-family:'Syne',sans-serif;
  font-weight:700;
  font-size:14px;
  color:#8e0f9f;
  margin-bottom:6px;
}

.pu-row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  padding:3px 0;
  border-bottom:1px solid #f0f0f0;
}

.pu-row:last-child{
  border-bottom:none;
}

.pu-label{
  color:#9b6da8;
}

.pu-val{
  font-weight:600;
  color:#5a2b68;
}
</style>
</head>

function getColor(v, max){

  if(p>0.6) return '#b232b8';
  if(p>0.4) return '#d96ad9';

}

function fmt(n){

function calcularPorComuna(datos){
  const agg = {};
  for(const d of datos){
    const c = d.comuna;
    if(!COORDS[c]) continue;
    if(!agg[c]) agg[c]={actividades:0,asistentes:0,atenciones:0};

    agg[c].asistentes  += d.asistentes;
    agg[c].atenciones  += d.atenciones;
  }
  return agg;
}

  const valores = Object.values(agg).map(v=>v.actividades);
  const maxAct = valores.length ? Math.max(...valores) : 1;

  for(const [c, vals] of Object.entries(agg)){
    const [lat,lng] = COORDS[c];
    const radio = 8 + (vals.actividades/maxAct)*38;
    const color = getColor(vals.actividades, maxAct);

    const circ = L.circleMarker([lat,lng],{
      radius: radio,
      fillColor: color,
      fillOpacity: 0.8,
      color: '#ffffff',
      weight: 2
    }).bindPopup(`
      <div class="pu-title">${c}</div>
      <div class="pu-row"><span class="pu-label">Actividades</span><span class="pu-val">${fmt(vals.actividades)}</span></div>
      <div class="pu-row"><span class="pu-label">Asistentes</span><span class="pu-val">${fmt(vals.asistentes)}</span></div>
      <div class="pu-row"><span class="pu-label">Atenciones</span><span class="pu-val">${fmt(Math.round(vals.atenciones))}</span></div>
    `).addTo(map);

    circ.bindTooltip(c,{permanent:false,direction:'top'});
    circulos[c] = circ;
  }

  if(map._legendControl) map.removeControl(map._legendControl);

  const leyenda = L.control({position:'bottomright'});
  leyenda.onAdd = () => {
    const d = L.DomUtil.create('div');
    d.style.cssText='background:white;padding:10px 14px;border-radius:10px;font-family:DM Sans,sans-serif;font-size:11px;box-shadow:0 4px 16px rgba(163,22,182,.16);border:1px solid #ebd7ef;';
    d.innerHTML=`<b style="font-size:12px;display:block;margin-bottom:6px;color:#8e0f9f">Número de actividades</b>
      ${[
        ['#f3d9f7','Bajo'],
        ['#e7a8ea','Medio-bajo'],
        ['#d96ad9','Medio'],
        ['#b232b8','Alto'],
        ['#8e0f9f','Muy alto']
      ].map(([c,l])=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;color:#4a235a"><div style="width:13px;height:13px;border-radius:50%;background:${c};border:1px solid #d4b2dc"></div>${l}</div>`).join('')}`;
    return d;
  };
  leyenda.addTo(map);
  map._legendControl = leyenda;
}

function renderTabla(datos){
  const agg = {};
  for(const d of datos){
    const p = d.programa || 'Sin especificar';
    if(!agg[p]) agg[p]=0;
    agg[p] += d.actividad;
  }
  const sorted = Object.entries(agg).sort((a,b)=>b[1]-a[1]);
  const tbody = document.getElementById('tablaBody');
  tbody.innerHTML = sorted.map(([p,v])=>`<tr><td>${p}</td><td>${fmt(v)}</td></tr>`).join('');
}

function renderKPIs(datos){
  const act = datos.reduce((s,d)=>s+d.actividad,0);
  const asi = datos.reduce((s,d)=>s+d.asistentes,0);
  const ate = datos.reduce((s,d)=>s+d.atenciones,0);
  const coms = new Set(datos.map(d=>d.comuna).filter(c=>COORDS[c]));

  document.getElementById('kAct').textContent = fmt(act);
  document.getElementById('kAsi').textContent = fmt(asi);
  document.getElementById('kAte').textContent = fmt(Math.round(ate));
  document.getElementById('kCom').textContent = coms.size;
  document.getElementById('sAct').textContent = fmt(act);
  document.getElementById('sAsi').textContent = fmt(asi);
  document.getElementById('sAte').textContent = fmt(Math.round(ate));
  document.getElementById('hBadge').textContent = fmt(act) + ' registros';
}

function filtrar(){
  const sub  = document.getElementById('fSub').value;
  const prog = document.getElementById('fProg').value;
  const zona = document.getElementById('fZona').value;
  const com  = document.getElementById('fCom').value;

  datosActuales = DATOS.filter(d =>
    (!sub  || d.subsecretaria===sub) &&
    (!prog || d.programa===prog) &&
    (!zona || d.zona===zona) &&
    (!com  || d.comuna===com)
  );

  renderKPIs(datosActuales);
  renderTabla(datosActuales);
  renderMapa(datosActuales);
}

function limpiar(){
  ['fSub','fProg','fZona','fCom'].forEach(id => document.getElementById(id).value='');
  filtrar();
}

renderKPIs(DATOS);
renderTabla(DATOS);
renderMapa(DATOS);
