<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Actividades Territoriales — Secretaría de Bienestar Cali</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--dark:#0f2236;--accent:#1565c0;--accent2:#1976d2;
  --cyan:#00acc1;--green:#2e7d32;--orange:#e65100;--red:#c62828;
  --text:#1a2332;--muted:#607d8b;--border:#e0e6ed;--radius:10px;
  --shadow:0 2px 12px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{background:var(--dark);color:#fff;padding:0 20px;height:54px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:3px solid var(--accent);}
.hdr-logo{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.hdr h1{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.hdr-sub{font-size:11px;color:#90a4ae;margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.badge{border-radius:20px;padding:3px 11px;font-size:11px;font-weight:600;}
.badge-blue{background:rgba(21,101,192,.18);color:#64b5f6;border:1px solid rgba(21,101,192,.3);}
.badge-green{background:rgba(46,125,50,.18);color:#81c784;border:1px solid rgba(46,125,50,.3);}

/* KPI STRIP */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px 16px;background:var(--dark);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.kpi{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;transition:background .2s;}
.kpi:hover{background:rgba(255,255,255,.09);}
.kpi-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.ki-b{background:rgba(21,101,192,.25);}
.ki-c{background:rgba(0,172,193,.25);}
.ki-g{background:rgba(46,125,50,.25);}
.ki-o{background:rgba(230,81,0,.25);}
.kpi-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;line-height:1;}
.kpi-lbl{font-size:10px;color:#90a4ae;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* MAIN LAYOUT */
.layout{display:grid;grid-template-columns:290px 1fr;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-sec{padding:12px 14px 8px;border-bottom:1px solid var(--border);}
.sb-sec h3{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.sel{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:7px 9px;font-size:12.5px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fff;outline:none;margin-bottom:6px;transition:border-color .2s;}
.sel:focus{border-color:var(--accent);}
.btn-row{display:flex;gap:6px;}
.btn{flex:1;padding:6px;border:1.5px solid var(--border);border-radius:7px;background:#fff;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .15s;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-filled{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-filled:hover{background:var(--accent2);}

/* TABLA SIDEBAR */
.sb-tabla{flex:1;overflow-y:auto;padding:8px 10px;}
.sb-tabla table{width:100%;border-collapse:collapse;font-size:12px;}
.sb-tabla th{background:#f5f7fa;color:var(--muted);font-weight:600;padding:5px 8px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border);}
.sb-tabla td{padding:5px 8px;border-bottom:1px solid #f0f0f0;color:var(--text);}
.sb-tabla tr:hover td{background:#f8fafc;}
.sb-tabla td:last-child,.sb-tabla th:last-child{text-align:right;font-weight:600;}

/* STATS BOTTOM */
.sb-stats{padding:8px 12px;display:flex;gap:6px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;}
.sstat{flex:1;text-align:center;background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px;}
.sstat .n{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--accent);}
.sstat .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}

/* MAPA */
#map{width:100%;height:100%;}
.leaflet-popup-content-wrapper{border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.12);font-family:'DM Sans',sans-serif;border:1px solid var(--border);}
.pu-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--dark);margin-bottom:6px;}
.pu-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid #f0f0f0;}
.pu-row:last-child{border-bottom:none;}
.pu-label{color:var(--muted);}
.pu-val{font-weight:600;color:var(--dark);}
</style>
</head>

// ── MAPA ──────────────────────────────────────────────────────
const map = L.map('map').setView([3.431,-76.520],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CartoDB',maxZoom:18
}).addTo(map);

let circulos = {};
let datosActuales = [...DATOS];

function getColor(v, max){
  const p = v/max;
  if(p>0.8) return '#b71c1c';
  if(p>0.6) return '#e53935';
  if(p>0.4) return '#ef9a9a';
  if(p>0.2) return '#ffcc80';
  return '#fff9c4';
}

function fmt(n){ return n.toLocaleString('es-CO'); }

function calcularPorComuna(datos){
  const agg = {};
  for(const d of datos){
    const c = d.comuna;
    if(!COORDS[c]) continue;
    if(!agg[c]) agg[c]={actividades:0,asistentes:0,atenciones:0};
    agg[c].actividades += d.actividad;
    agg[c].asistentes  += d.asistentes;
    agg[c].atenciones  += d.atenciones;
  }
  return agg;
}

function renderMapa(datos){
  // Limpiar
  Object.values(circulos).forEach(c=>map.removeLayer(c));
  circulos = {};

  const agg = calcularPorComuna(datos);
  const maxAct = Math.max(...Object.values(agg).map(v=>v.actividades),1);

  for(const [c, vals] of Object.entries(agg)){
    const [lat,lng] = COORDS[c];
    const radio = 8 + (vals.actividades/maxAct)*38;
    const color = getColor(vals.actividades, maxAct);

    const circ = L.circleMarker([lat,lng],{
      radius: radio,
      fillColor: color,
      fillOpacity: 0.78,
      color: '#fff',
      weight: 1.5
    }).bindPopup(`
      <div class="pu-title">${c}</div>
      <div class="pu-row"><span class="pu-label">Actividades</span><span class="pu-val">${fmt(vals.actividades)}</span></div>
      <div class="pu-row"><span class="pu-label">Asistentes</span><span class="pu-val">${fmt(vals.asistentes)}</span></div>
      <div class="pu-row"><span class="pu-label">Atenciones</span><span class="pu-val">${fmt(vals.atenciones)}</span></div>
    `).addTo(map);

    circ.bindTooltip(c,{permanent:false,direction:'top'});
    circulos[c] = circ;
  }

  // Leyenda
  if(map._legendControl) map.removeControl(map._legendControl);
  const leyenda = L.control({position:'bottomright'});
  leyenda.onAdd = () => {
    const d = L.DomUtil.create('div');
    d.style.cssText='background:white;padding:10px 14px;border-radius:8px;font-family:DM Sans,sans-serif;font-size:11px;box-shadow:0 2px 10px rgba(0,0,0,.15);';
    d.innerHTML=`<b style="font-size:12px;display:block;margin-bottom:6px">Número de actividades</b>
      ${[['#fff9c4','Bajo'],['#ffcc80','Medio-bajo'],['#ef9a9a','Medio'],['#e53935','Alto'],['#b71c1c','Muy alto']]
        .map(([c,l])=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="width:13px;height:13px;border-radius:50%;background:${c};border:1px solid #ccc"></div>${l}</div>`).join('')}`;
    return d;
  };
  leyenda.addTo(map);
  map._legendControl = leyenda;
}

function renderTabla(datos){
  const agg = {};
  for(const d of datos){
    const p = d.programa||'Sin especificar';
    if(!agg[p]) agg[p]=0;
    agg[p] += d.actividad;
  }
  const sorted = Object.entries(agg).sort((a,b)=>b[1]-a[1]);
  const tbody = document.getElementById('tablaBody');
  tbody.innerHTML = sorted.map(([p,v])=>`
    <tr><td>${p}</td><td>${fmt(v)}</td></tr>`).join('');
}

function renderKPIs(datos){
  const act = datos.reduce((s,d)=>s+d.actividad,0);
  const asi = datos.reduce((s,d)=>s+d.asistentes,0);
  const ate = datos.reduce((s,d)=>s+d.atenciones,0);
  const coms = new Set(datos.map(d=>d.comuna).filter(c=>COORDS[c]));

  document.getElementById('kAct').textContent = fmt(act);
  document.getElementById('kAsi').textContent = fmt(asi);
  document.getElementById('kAte').textContent = fmt(Math.round(ate));
  document.getElementById('kCom').textContent = coms.size;
  document.getElementById('sAct').textContent = fmt(act);
  document.getElementById('sAsi').textContent = fmt(asi);
  document.getElementById('sAte').textContent = fmt(Math.round(ate));
  document.getElementById('hBadge').textContent = fmt(act)+' registros';
}

function filtrar(){
  const sub  = document.getElementById('fSub').value;
  const prog = document.getElementById('fProg').value;
  const zona = document.getElementById('fZona').value;
  const com  = document.getElementById('fCom').value;

  datosActuales = DATOS.filter(d=>
    (!sub  || d.subsecretaria===sub)  &&
    (!prog || d.programa===prog)       &&
    (!zona || d.zona===zona)           &&
    (!com  || d.comuna===com)
  );

  renderKPIs(datosActuales);
  renderTabla(datosActuales);
  renderMapa(datosActuales);
}

function limpiar(){
  ['fSub','fProg','fZona','fCom'].forEach(id=>document.getElementById(id).value='');
  filtrar();
}

// Init
renderKPIs(DATOS);
renderTabla(DATOS);
renderMapa(DATOS);
</script>
</body>
</html>
